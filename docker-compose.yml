version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      # Mount artifacts and models as read-only volumes
      - ./soil_ai_system/saved_artifacts:/app/soil_ai_system/saved_artifacts:ro
      - ./soil_ai_system/saved_models:/app/soil_ai_system/saved_models:ro
      # Mount operations log directory
      - ./logs/operations:/app/logs/operations
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      # Frontend must hit the backend internal network
      - API_BASE_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  logs_volume:
